<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHORA - Vuelve al presente</title>
    <style>
        :root {
            --primary: #7b68ee;
            --bg-gradient: linear-gradient(180deg, #f4f4f9 0%, #e6e6fa 100%);
            --text: #333;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            line-height: 1.6;
            color: var(--text);
            background-color: #f4f4f9;
            scroll-behavior: smooth;
        }

        /* --- SECCIÓN VISUAL (ÁRBOL) --- */
        .hero-section {
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(244,244,249,1)), url('tree.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 120px 20px;
            text-align: center;
            color: white;
        }

        .logo-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 25px;
            border: 3px solid rgba(255,255,255,0.3);
        }

        .logo-text { 
            font-size: 5rem; 
            font-weight: bold; 
            letter-spacing: 12px; 
            margin: 0;
            text-shadow: 3px 3px 15px rgba(0,0,0,0.4);
        }

        .hero-subtitle { 
            font-size: 1.5rem; 
            max-width: 700px; 
            margin: 20px auto; 
            text-shadow: 1px 1px 8px rgba(0,0,0,0.6);
            font-style: italic;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; }

        /* --- DESCRIPCIÓN DE LA APP --- */
        .app-description {
            background: var(--white);
            padding: 50px;
            border-radius: 30px;
            margin: -60px auto 60px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .feature-item {
            background: #fdfdff;
            padding: 25px;
            border-radius: 20px;
            border: 1px solid #f0f0f5;
            transition: 0.3s;
        }

        .feature-item:hover { transform: translateY(-5px); }
        .feature-item h3 { color: var(--primary); margin-top: 0; font-size: 1.3rem; }

        /* --- TABLA DE PRECIOS --- */
        .pricing-section { padding: 40px 0; }
        .pricing-table {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .price-card {
            background: var(--white);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            width: 320px;
            text-align: center;
            border: 2px solid transparent;
